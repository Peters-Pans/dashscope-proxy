# Nginx 反向代理配置（可选，用于 HTTPS + 域名）
# 放到 /etc/nginx/sites-available/dashproxy 然后 ln -s 到 sites-enabled

server {
    listen 80;
    server_name your-domain.com;  # ← 改成你的域名或服务器IP

    # 如果用了 Certbot，它会自动改这里加 443
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;  # ← 改成你的域名或服务器IP

    # SSL 证书（Certbot 自动填写，或手动配置）
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 管理后台：只允许内网/自己访问
    location /_admin {
        allow 127.0.0.1;
        # allow 你的IP;   # ← 可以加自己的公网IP
        deny all;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 流式响应：关闭缓冲
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 流式必须关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE 支持
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }
}
